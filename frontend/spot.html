<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spot Details</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="topbar">
        <h1><button onclick="window.location.href='index.html'">NUSight</button></h1>
      </div>
    </header>
    <section class="results">
      <div id="spot-detail">
        <h2>Loading spot info...</h2>
      </div>
    </section>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const spotId = params.get("id");

    const spotData = {
      "COM1_Level_2": {
        title: "COM1 Level 2",
        desc: "Computing, Open 24/7",
        tags: ["Aircon", "Quiet", "Outlets"]
      },
      "CLB_Study_Area": {
        title: "CLB Study Area",
        desc: "Central Library, 8AM-10PM",
        tags: ["Library", "Quiet", "Aircon"]
      },
      "UTown_Plaza": {
        title: "UTown Plaza",
        desc: "Town Green, Near You",
        tags: ["Cafeteria", "Benches", "Outlets"]
      }
    };

    const spot = spotData[spotId];
    if (spot) {
      document.getElementById("spot-detail").innerHTML = `
        <h2>${spot.title}</h2>
        <p>${spot.desc}</p>
        <p><strong>Tags:</strong> ${spot.tags.join(", ")}</p>
      `;
    } else {
      document.getElementById("spot-detail").textContent = "Spot not found.";
    }
  </script>
</body>
</html>
